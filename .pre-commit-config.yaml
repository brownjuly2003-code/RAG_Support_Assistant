repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff-check
        args: [--fix]
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^(?:archive/|codex-tasks/Archive/|docs/research/|docs/superpowers/specs/)
      - id: end-of-file-fixer
        exclude: ^(?:archive/|codex-tasks/Archive/|docs/research/|docs/superpowers/specs/|vectordb/__init__\.py$)
      - id: check-yaml
        exclude: ^deploy/helm/templates/
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: detect-private-key
