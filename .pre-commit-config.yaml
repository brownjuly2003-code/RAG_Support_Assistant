repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff-check
        args: [--fix]
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^(?:archive/|codex-tasks/Archive/|docs/research/|docs/superpowers/specs/)
      - id: end-of-file-fixer
        exclude: ^(?:archive/|codex-tasks/Archive/|docs/research/|docs/superpowers/specs/|vectordb/__init__\.py$)
      - id: check-yaml
        exclude: ^deploy/helm/templates/
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        args: ["-r", "-ll", "-c", "pyproject.toml"]
        additional_dependencies: ["bandit[toml]"]
        # Block commits on Medium+ severity findings only (Low triggers at the
        # CLI level: `bandit -r . -l -c pyproject.toml` for full scan).

  - repo: https://github.com/pypa/pip-audit
    rev: v2.10.0
    hooks:
      - id: pip-audit
        args: ["--strict", "--disable-pip", "--require-hashes", "--timeout", "15", "--progress-spinner", "off", "--cache-dir", ".tmp/pip-audit-cache", "-r", "requirements.lock"]
        files: ^(?:requirements(?:-dev)?\.(?:txt|lock)|\.pre-commit-config\.yaml)$
        pass_filenames: false
        # Audit the generated lock only. requirements.txt is intentionally
        # loose and sends pip-audit through pip resolution. Use a repo-local
        # ignored cache to avoid hangs in the default pip cache location.
