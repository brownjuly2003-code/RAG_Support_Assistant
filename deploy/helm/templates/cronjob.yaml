apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Release.Name }}-rag-nightly-eval
spec:
  schedule: "0 2 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: nightly-eval
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              command:
                - python
                - scripts/nightly_eval.py
              envFrom:
                - configMapRef:
                    name: {{ .Release.Name }}-config
---
