apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ printf "%s-%s" .Chart.Name .Chart.Version | replace "+" "_" }}
    app.kubernetes.io/component: config
data:
  {{- if eq (default "" .Values.env.RAG_ENV) "production" }}
  {{- if not .Values.env.CORS_ORIGINS }}
  {{- fail "Helm: env.CORS_ORIGINS must be set when env.RAG_ENV=production. Provide --set env.CORS_ORIGINS=\"https://app.example.com\" or override RAG_ENV." }}
  {{- end }}
  {{- end }}
  {{- range $key, $value := .Values.env }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
