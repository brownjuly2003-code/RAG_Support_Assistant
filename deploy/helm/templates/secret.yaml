{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ printf "%s-%s" .Chart.Name .Chart.Version | replace "+" "_" }}
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  {{- $required := list "DATABASE_URL" "JWT_SECRET" "SESSION_SECRET_KEY" "ADMIN_PASSWORD_HASH" "DB_ENCRYPTION_KEY" }}
  {{- range $key := $required }}
  {{- $value := index $.Values.secrets $key }}
  {{- if not $value }}
  {{- fail (printf "Helm: required secret '%s' is empty. Set it via --set secrets.%s=... or provide secrets.existingSecret." $key $key) }}
  {{- end }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- $optional := list "MISTRAL_API_KEY" "ANTHROPIC_API_KEY" "OPENAI_API_KEY" "SMTP_PASSWORD" "IMAP_PASSWORD" "EMAIL_WEBHOOK_SIGNING_SECRET" "POSTGRES_PASSWORD" }}
  {{- range $key := $optional }}
  {{- $value := index $.Values.secrets $key }}
  {{- if $value }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- end }}
{{- end }}
