apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Release.Name }}-threshold-analysis
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ printf "%s-%s" .Chart.Name .Chart.Version | replace "+" "_" }}
    app.kubernetes.io/component: threshold-analysis
spec:
  schedule: "0 9 * * 1"
  jobTemplate:
    spec:
      backoffLimit: 6
      template:
        metadata:
          labels:
            app: {{ .Release.Name }}-threshold-analysis
            app.kubernetes.io/name: {{ .Chart.Name }}
            app.kubernetes.io/instance: {{ .Release.Name }}
            app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
            app.kubernetes.io/managed-by: {{ .Release.Service }}
            helm.sh/chart: {{ printf "%s-%s" .Chart.Name .Chart.Version | replace "+" "_" }}
            app.kubernetes.io/component: threshold-analysis
        spec:
          restartPolicy: OnFailure
          containers:
            - name: threshold-analysis
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              command:
                - python
                - scripts/analyze_thresholds.py
                - --days
                - "30"
                - --tenant
                - all
                - --out
                - reports/threshold_recommendations.md
              envFrom:
                - configMapRef:
                    name: {{ .Release.Name }}-config
              resources:
                {{- toYaml .Values.resources | nindent 16 }}
