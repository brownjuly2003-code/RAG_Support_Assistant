apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Release.Name }}-curated-staleness
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ printf "%s-%s" .Chart.Name .Chart.Version | replace "+" "_" }}
    app.kubernetes.io/component: curated-staleness
spec:
  schedule: "0 3 * * *"
  successfulJobsHistoryLimit: 7
  failedJobsHistoryLimit: 14
  jobTemplate:
    spec:
      backoffLimit: 6
      template:
        metadata:
          labels:
            app: {{ .Release.Name }}-curated-staleness
            app.kubernetes.io/name: {{ .Chart.Name }}
            app.kubernetes.io/instance: {{ .Release.Name }}
            app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
            app.kubernetes.io/managed-by: {{ .Release.Service }}
            helm.sh/chart: {{ printf "%s-%s" .Chart.Name .Chart.Version | replace "+" "_" }}
            app.kubernetes.io/component: curated-staleness
        spec:
          restartPolicy: OnFailure
          containers:
            - name: curated-staleness
              image: {{ include "rag-support-assistant.image" . | quote }}
              command:
                - python
                - scripts/detect_stale_curated_cases.py
                - --apply
                - --report
                - "/reports/curated-staleness.md"
              envFrom:
                {{- include "rag-support-assistant.envFrom" . | nindent 16 }}
              resources:
                {{- toYaml .Values.resources | nindent 16 }}
              volumeMounts:
                - name: reports
                  mountPath: /reports
          volumes:
            - name: reports
              persistentVolumeClaim:
                claimName: {{ .Release.Name }}-reports
