apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Release.Name }}-curated-staleness
spec:
  schedule: "0 3 * * *"
  successfulJobsHistoryLimit: 7
  failedJobsHistoryLimit: 14
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: curated-staleness
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              command:
                - python
                - scripts/detect_stale_curated_cases.py
                - --apply
                - --report
                - "/reports/curated-staleness.md"
              envFrom:
                - configMapRef:
                    name: {{ .Release.Name }}-config
              volumeMounts:
                - name: reports
                  mountPath: /reports
          volumes:
            - name: reports
              persistentVolumeClaim:
                claimName: {{ .Release.Name }}-reports
