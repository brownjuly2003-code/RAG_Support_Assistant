apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Release.Name }}-backup-integrity
spec:
  schedule: "0 5 * * 0"
  successfulJobsHistoryLimit: 4
  failedJobsHistoryLimit: 8
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: backup-integrity
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              command:
                - python
                - scripts/backup_integrity.py
                - --backup-dir
                - "/backups"
                - --report
                - "/reports/backup-integrity.md"
              envFrom:
                - configMapRef:
                    name: {{ .Release.Name }}-config
              volumeMounts:
                - name: backups
                  mountPath: /backups
                - name: reports
                  mountPath: /reports
          volumes:
            - name: backups
              persistentVolumeClaim:
                claimName: {{ .Release.Name }}-backups
            - name: reports
              persistentVolumeClaim:
                claimName: {{ .Release.Name }}-reports
