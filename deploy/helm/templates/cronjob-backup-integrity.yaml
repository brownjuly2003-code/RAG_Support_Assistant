apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Release.Name }}-backup-integrity
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ printf "%s-%s" .Chart.Name .Chart.Version | replace "+" "_" }}
    app.kubernetes.io/component: backup-integrity
spec:
  schedule: "0 5 * * 0"
  successfulJobsHistoryLimit: 4
  failedJobsHistoryLimit: 8
  jobTemplate:
    spec:
      backoffLimit: 6
      template:
        metadata:
          labels:
            app: {{ .Release.Name }}-backup-integrity
            app.kubernetes.io/name: {{ .Chart.Name }}
            app.kubernetes.io/instance: {{ .Release.Name }}
            app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
            app.kubernetes.io/managed-by: {{ .Release.Service }}
            helm.sh/chart: {{ printf "%s-%s" .Chart.Name .Chart.Version | replace "+" "_" }}
            app.kubernetes.io/component: backup-integrity
        spec:
          restartPolicy: OnFailure
          containers:
            - name: backup-integrity
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              command:
                - python
                - scripts/backup_integrity.py
                - --backup-dir
                - "/backups"
                - --report
                - "/reports/backup-integrity.md"
              envFrom:
                - configMapRef:
                    name: {{ .Release.Name }}-config
              resources:
                {{- toYaml .Values.resources | nindent 16 }}
              volumeMounts:
                - name: backups
                  mountPath: /backups
                - name: reports
                  mountPath: /reports
          volumes:
            - name: backups
              persistentVolumeClaim:
                claimName: {{ .Release.Name }}-backups
            - name: reports
              persistentVolumeClaim:
                claimName: {{ .Release.Name }}-reports
