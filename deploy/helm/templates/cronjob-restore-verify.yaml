apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Release.Name }}-restore-verify
spec:
  schedule: "0 4 * * 0"
  successfulJobsHistoryLimit: 4
  failedJobsHistoryLimit: 8
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: restore-verify
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              command:
                - sh
                - -c
                - |
                  latest="$(ls -1dt /backups/*/ 2>/dev/null | head -n 1)"
                  if [ -z "$latest" ]; then
                    echo "no snapshots in /backups" >&2
                    exit 3
                  fi
                  python scripts/restore_verify.py --snapshot "$latest" --report /reports/restore-verify.md
              envFrom:
                - configMapRef:
                    name: {{ .Release.Name }}-config
              volumeMounts:
                - name: backups
                  mountPath: /backups
                - name: reports
                  mountPath: /reports
          volumes:
            - name: backups
              persistentVolumeClaim:
                claimName: {{ .Release.Name }}-backups
            - name: reports
              persistentVolumeClaim:
                claimName: {{ .Release.Name }}-reports
