apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Release.Name }}-backup-snapshot
spec:
  schedule: "0 1 * * *"
  successfulJobsHistoryLimit: 7
  failedJobsHistoryLimit: 14
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: backup-snapshot
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              command:
                - python
                - scripts/backup_snapshot.py
                - --out
                - "/backups/$(date -u +%Y%m%dT%H%M%SZ)"
              envFrom:
                - configMapRef:
                    name: {{ .Release.Name }}-config
              volumeMounts:
                - name: backups
                  mountPath: /backups
          volumes:
            - name: backups
              persistentVolumeClaim:
                claimName: {{ .Release.Name }}-backups
