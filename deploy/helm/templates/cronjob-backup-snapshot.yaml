apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Release.Name }}-backup-snapshot
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ printf "%s-%s" .Chart.Name .Chart.Version | replace "+" "_" }}
    app.kubernetes.io/component: backup-snapshot
spec:
  schedule: "0 1 * * *"
  successfulJobsHistoryLimit: 7
  failedJobsHistoryLimit: 14
  jobTemplate:
    spec:
      backoffLimit: 6
      template:
        metadata:
          labels:
            app: {{ .Release.Name }}-backup-snapshot
            app.kubernetes.io/name: {{ .Chart.Name }}
            app.kubernetes.io/instance: {{ .Release.Name }}
            app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
            app.kubernetes.io/managed-by: {{ .Release.Service }}
            helm.sh/chart: {{ printf "%s-%s" .Chart.Name .Chart.Version | replace "+" "_" }}
            app.kubernetes.io/component: backup-snapshot
        spec:
          restartPolicy: OnFailure
          containers:
            - name: backup-snapshot
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              command:
                - python
                - scripts/backup_snapshot.py
                - --out
                - "/backups/$(date -u +%Y%m%dT%H%M%SZ)"
              envFrom:
                - configMapRef:
                    name: {{ .Release.Name }}-config
              resources:
                {{- toYaml .Values.resources | nindent 16 }}
              volumeMounts:
                - name: backups
                  mountPath: /backups
          volumes:
            - name: backups
              persistentVolumeClaim:
                claimName: {{ .Release.Name }}-backups
