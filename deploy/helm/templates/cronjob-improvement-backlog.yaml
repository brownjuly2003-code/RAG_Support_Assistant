apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Release.Name }}-improvement-backlog
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: {{ printf "%s-%s" .Chart.Name .Chart.Version | replace "+" "_" }}
    app.kubernetes.io/component: improvement-backlog
spec:
  schedule: "0 6 * * 1"
  jobTemplate:
    spec:
      backoffLimit: 6
      template:
        metadata:
          labels:
            app: {{ .Release.Name }}-improvement-backlog
            app.kubernetes.io/name: {{ .Chart.Name }}
            app.kubernetes.io/instance: {{ .Release.Name }}
            app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
            app.kubernetes.io/managed-by: {{ .Release.Service }}
            helm.sh/chart: {{ printf "%s-%s" .Chart.Name .Chart.Version | replace "+" "_" }}
            app.kubernetes.io/component: improvement-backlog
        spec:
          restartPolicy: OnFailure
          containers:
            - name: improvement-backlog
              image: {{ include "rag-support-assistant.image" . | quote }}
              command:
                - python
                - scripts/generate_improvement_backlog.py
                - --tenant
                - all
              envFrom:
                {{- include "rag-support-assistant.envFrom" . | nindent 16 }}
              resources:
                {{- toYaml .Values.resources | nindent 16 }}
