replicaCount: 2

image:
  repository: rag-support-assistant
  # Tag defaults to Chart.appVersion when empty (see _helpers.tpl).
  # Override per-environment via --set image.tag=<version>.
  tag: ""
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: false
  className: nginx
  hosts:
    - host: support.example.com
      paths:
        - path: /
          pathType: Prefix

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 2000m
    memory: 4Gi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 8
  targetCPUUtilizationPercentage: 70

# Public, non-sensitive env. Goes into ConfigMap, visible via `kubectl get configmap`.
# RAG_ENV=production triggers Settings.validate() in api/app.py lifespan, which
# rejects "*" CORS origins. CORS_ORIGINS is intentionally absent from defaults
# so the chart aborts via templates/configmap.yaml when production mode is on
# but the operator forgot to set it. Provide it via:
#   --set env.CORS_ORIGINS="https://app.example.com,https://admin.example.com"
env:
  RAG_ENV: "production"
  OLLAMA_BASE_URL: "http://ollama:11434"
  REDIS_URL: "redis://redis:6379/0"
  REQUIRE_OLLAMA: "true"
  RAG_SEMANTIC_CHUNKING: "true"
  OTEL_ENABLED: "false"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
  OTEL_SERVICE_NAME: "rag-support-assistant"

# Sensitive env. Rendered as Kubernetes Secret. Required keys:
#   DATABASE_URL, JWT_SECRET, SESSION_SECRET_KEY, ADMIN_PASSWORD_HASH, DB_ENCRYPTION_KEY
# To use a pre-provisioned Secret instead, set `secrets.existingSecret: <name>`
# and leave the other keys empty — secret.yaml will not be rendered.
secrets:
  existingSecret: ""
  DATABASE_URL: ""
  JWT_SECRET: ""
  SESSION_SECRET_KEY: ""
  ADMIN_PASSWORD_HASH: ""
  DB_ENCRYPTION_KEY: ""
  # Optional — only added to Secret when non-empty.
  MISTRAL_API_KEY: ""
  ANTHROPIC_API_KEY: ""
  OPENAI_API_KEY: ""
  SMTP_PASSWORD: ""
  IMAP_PASSWORD: ""
  EMAIL_WEBHOOK_SIGNING_SECRET: ""
  POSTGRES_PASSWORD: ""

postgresql:
  enabled: true
  auth:
    database: rag_assistant
    username: rag
    # Set via --set postgresql.auth.password=... or provide existingSecret to
    # the Bitnami Postgres chart. No default — install will fail until set.
    password: ""

redis:
  enabled: true

otel:
  enabled: false
  endpoint: "http://otel-collector:4317"

ollama:
  enabled: true
  model: "qwen2.5:7b"
  resources:
    limits:
      nvidia.com/gpu: 1

backup:
  encryption:
    enabled: false
