<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBFCFE"/>
      <stop offset="100%" stop-color="#F1F5F9"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Left accent rail -->
  <rect x="0" y="0" width="14" height="630" fill="#0A6CB4"/>

  <!-- Eyebrow rule + label -->
  <line x1="80" y1="118" x2="160" y2="118" stroke="#0A6CB4" stroke-width="2"/>
  <text x="172" y="124"
        font-family="Inter, system-ui, sans-serif"
        font-size="20" font-weight="600"
        letter-spacing="3.5"
        fill="#0A6CB4">DOCS HUB</text>

  <!-- Title -->
  <text x="80" y="220"
        font-family="Inter, system-ui, sans-serif"
        font-size="84" font-weight="800"
        fill="#0F1729"
        letter-spacing="-2">RAG Support Assistant</text>

  <!-- Subtitle -->
  <text x="80" y="278"
        font-family="Inter, system-ui, sans-serif"
        font-size="30" font-weight="500"
        fill="#475569">LangGraph retrieval · observability · offline evaluation</text>

  <!-- Stats row -->
  <line x1="80" y1="358" x2="1120" y2="358" stroke="#E2E8F0" stroke-width="1"/>
  <line x1="80" y1="488" x2="1120" y2="488" stroke="#E2E8F0" stroke-width="1"/>

  <g font-family="Inter, system-ui, sans-serif">
    <!-- Stat 1 -->
    <text x="80" y="412" font-size="56" font-weight="800" fill="#0F1729" letter-spacing="-1">9</text>
    <text x="80" y="448" font-size="16" font-weight="600" fill="#475569" letter-spacing="1.5">SIDEBAR PAGES · BILINGUAL</text>

    <!-- Stat 2 -->
    <text x="430" y="412" font-size="56" font-weight="800" fill="#0F1729" letter-spacing="-1">E20</text>
    <text x="430" y="448" font-size="16" font-weight="600" fill="#475569" letter-spacing="1.5">REPRODUCIBLE TRACE</text>

    <!-- Stat 3 -->
    <text x="780" y="412" font-size="56" font-weight="800" fill="#0F1729" letter-spacing="-1">12</text>
    <text x="780" y="448" font-size="16" font-weight="600" fill="#475569" letter-spacing="1.5">OFFLINE BENCHMARK CASES</text>
  </g>

  <!-- Author + custom inline SVG graph motif -->
  <g transform="translate(80, 540)">
    <text x="0" y="0"
          font-family="Inter, system-ui, sans-serif"
          font-size="20" font-weight="600"
          fill="#0F1729">Julia Edomskikh</text>
    <text x="0" y="28"
          font-family="Inter, system-ui, sans-serif"
          font-size="16" font-weight="400"
          fill="#475569">Senior Data Analyst · Data Engineer</text>
  </g>

  <!-- Graph nodes motif (custom inline SVG, no icons) -->
  <g transform="translate(960, 540)" fill="none" stroke-linecap="round">
    <line x1="14" y1="14" x2="74" y2="-26" stroke="#0A6CB4" stroke-width="2"/>
    <line x1="14" y1="14" x2="74" y2="54" stroke="#0A6CB4" stroke-width="2"/>
    <line x1="74" y1="-26" x2="134" y2="14" stroke="#0A6CB4" stroke-width="2"/>
    <line x1="74" y1="54" x2="134" y2="14" stroke="#0A6CB4" stroke-width="2"/>
    <circle cx="14"  cy="14"  r="10" fill="#FFFFFF" stroke="#0A6CB4" stroke-width="3"/>
    <circle cx="74"  cy="-26" r="10" fill="#FFFFFF" stroke="#0A6CB4" stroke-width="3"/>
    <circle cx="74"  cy="54"  r="10" fill="#FFFFFF" stroke="#0A6CB4" stroke-width="3"/>
    <circle cx="134" cy="14"  r="14" fill="#3DDC97" stroke="#0A6CB4" stroke-width="3"/>
  </g>
</svg>