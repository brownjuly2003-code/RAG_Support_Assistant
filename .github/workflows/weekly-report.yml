name: Weekly Report

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Render without Slack/email delivery"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  weekly-report:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run weekly report
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            python scripts/weekly_report.py
          elif [ "${{ inputs.dry_run }}" = "false" ]; then
            python scripts/weekly_report.py
          else
            python scripts/weekly_report.py --dry-run
          fi
