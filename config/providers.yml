default_profile: gracekelly-primary

providers:
  - id: ollama
    label: Ollama
    kind: local
    enabled: true
    api_key_env: null
    default_models:
      fast: qwen2.5:7b
      strong: qwen2.5:7b
    capabilities:
      supports_tool_use: true
      supports_structured_output: true
      supports_streaming: true
      supports_batch: false
      supports_vision: false
    rate_limits:
      requests_per_minute: 0
      tokens_per_minute: 0
    models:
      - name: qwen2.5:7b
        aliases: [ollama-small, ollama-fast]
        input_price_per_1m_tokens: 0.0
        output_price_per_1m_tokens: 0.0
      - name: llama3.2:3b
        aliases: [ollama-tiny]
        input_price_per_1m_tokens: 0.0
        output_price_per_1m_tokens: 0.0

  - id: gracekelly
    label: GraceKelly local orchestrator
    kind: local
    enabled: true
    api_key_env: GRACEKELLY_API_KEY
    default_models:
      fast: mistral-small
      strong: claude-sonnet-4-6
    capabilities:
      supports_tool_use: true
      supports_structured_output: true
      supports_streaming: true
      supports_batch: true
      supports_vision: false
    rate_limits:
      requests_per_minute: 0
      tokens_per_minute: 0
    models:
      - name: mistral-small
        aliases: [gk-mistral, gk-fast]
        input_price_per_1m_tokens: 0.0
        output_price_per_1m_tokens: 0.0
      - name: claude-sonnet-4-6
        aliases: [gk-claude-sonnet, gk-strong, claude-sonnet-4-6-api]
        input_price_per_1m_tokens: 0.0
        output_price_per_1m_tokens: 0.0
      - name: gpt-5-4-api
        aliases: [gk-gpt-5]
        input_price_per_1m_tokens: 0.0
        output_price_per_1m_tokens: 0.0

  - id: mistral
    label: Mistral
    kind: paid
    enabled: true
    api_key_env: MISTRAL_API_KEY
    default_models:
      fast: ministral-3b-latest
      strong: mistral-small-latest
    capabilities:
      supports_tool_use: true
      supports_structured_output: true
      supports_streaming: true
      supports_batch: false
      supports_vision: false
    rate_limits:
      requests_per_minute: 60
      tokens_per_minute: 500000
    models:
      - name: ministral-3b-latest
        aliases: [ministral-3b, mistral-tiny]
        input_price_per_1m_tokens: 0.04
        output_price_per_1m_tokens: 0.04
      - name: ministral-8b-latest
        aliases: [ministral-8b]
        input_price_per_1m_tokens: 0.10
        output_price_per_1m_tokens: 0.10
      - name: mistral-small-latest
        aliases: [mistral-small]
        input_price_per_1m_tokens: 0.20
        output_price_per_1m_tokens: 0.60
      - name: mistral-large-latest
        aliases: [mistral-large]
        input_price_per_1m_tokens: 2.00
        output_price_per_1m_tokens: 6.00

routing_profiles:
  local-first:
    description: Explicit local-only Ollama routing, zero paid spend.
    fast:
      provider: ollama
      model: qwen2.5:7b
    strong:
      provider: ollama
      model: qwen2.5:7b

  gracekelly-primary:
    description: GraceKelly orchestrator for both tiers (Perplexity Pro-backed default), with explicit Ollama fallback on failure.
    fast:
      provider: gracekelly
      model: mistral-small
    strong:
      provider: gracekelly
      model: claude-sonnet-4-6
    fallback:
      provider: ollama
      model: qwen2.5:7b

  external-mistral:
    description: Direct Mistral API for external deployments without GraceKelly; cheap, dependable, no local orchestrator dependency.
    fast:
      provider: mistral
      model: ministral-3b-latest
    strong:
      provider: mistral
      model: mistral-small-latest

  gracekelly-mixed:
    description: Mixed routing — Mistral API for fast tier (classify/transform/grade_docs/verify_facts/extract_claims/online_evaluators), GraceKelly browser for strong tier (final answer + suggest_questions). Reduces browser submits per case from 4-7 to ~3 while keeping full Self-RAG / Corrective RAG / auto-route intact. Also a valid production routing for single-user local deploys with both Mistral key and GraceKelly available.
    fast:
      provider: mistral
      model: ministral-3b-latest
    strong:
      provider: gracekelly
      model: claude-sonnet-4-6
