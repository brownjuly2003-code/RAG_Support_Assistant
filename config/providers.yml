default_profile: latency-first

providers:
  - id: ollama
    label: Ollama
    kind: local
    enabled: true
    api_key_env: null
    default_models:
      fast: qwen2.5:7b
      strong: qwen2.5:7b
    capabilities:
      supports_tool_use: false
      supports_structured_output: false
      supports_vision: false
    rate_limits:
      requests_per_minute: 0
      tokens_per_minute: 0
    models:
      - name: qwen2.5:7b
        aliases: [ollama-small, ollama-fast]
        input_price_per_1m_tokens: 0.0
        output_price_per_1m_tokens: 0.0
      - name: llama3.2:3b
        aliases: [ollama-tiny]
        input_price_per_1m_tokens: 0.0
        output_price_per_1m_tokens: 0.0

  - id: claude
    label: Anthropic Claude
    kind: paid
    enabled: true
    api_key_env: ANTHROPIC_API_KEY
    default_models:
      fast: claude-haiku-4-5
      strong: claude-sonnet-4-6
    capabilities:
      supports_tool_use: true
      supports_structured_output: true
      supports_vision: true
    rate_limits:
      requests_per_minute: 50
      tokens_per_minute: 400000
    models:
      - name: claude-haiku-4-5
        aliases: [claude-haiku, claude-fast]
        input_price_per_1m_tokens: 1.0
        output_price_per_1m_tokens: 5.0
      - name: claude-sonnet-4-6
        aliases: [claude-sonnet, claude-strong]
        input_price_per_1m_tokens: 3.0
        output_price_per_1m_tokens: 15.0

  - id: openai
    label: OpenAI
    kind: paid
    enabled: true
    api_key_env: OPENAI_API_KEY
    default_models:
      fast: gpt-5.4-mini
      strong: gpt-5.4
    capabilities:
      supports_tool_use: true
      supports_structured_output: true
      supports_vision: true
    rate_limits:
      requests_per_minute: 60
      tokens_per_minute: 500000
    models:
      - name: gpt-5.4-mini
        aliases: [openai-fast, gpt-5-mini]
        input_price_per_1m_tokens: 0.75
        output_price_per_1m_tokens: 4.5
      - name: gpt-5.4
        aliases: [openai-strong, gpt-5]
        input_price_per_1m_tokens: 2.5
        output_price_per_1m_tokens: 15.0

  - id: gemini
    label: Google Gemini
    kind: paid
    enabled: true
    api_key_env: GEMINI_API_KEY
    default_models:
      fast: gemini-3-flash-preview
      strong: gemini-3.1-pro-preview
    capabilities:
      supports_tool_use: true
      supports_structured_output: true
      supports_vision: true
    rate_limits:
      requests_per_minute: 60
      tokens_per_minute: 500000
    models:
      - name: gemini-3-flash-preview
        aliases: [gemini-flash, gemini-fast]
        input_price_per_1m_tokens: 0.5
        output_price_per_1m_tokens: 3.0
      - name: gemini-3.1-pro-preview
        aliases: [gemini-pro, gemini-strong]
        input_price_per_1m_tokens: 2.0
        output_price_per_1m_tokens: 12.0

routing_profiles:
  latency-first:
    description: Local-only routing through Ollama for the lowest latency and zero paid spend.
    fast:
      provider: ollama
      model: qwen2.5:7b
    strong:
      provider: ollama
      model: qwen2.5:7b

  cost-first:
    description: Cheapest paid routing profile using Claude Haiku for strong reasoning and Gemini Flash for fast helper calls.
    fast:
      provider: gemini
      model: gemini-3-flash-preview
    strong:
      provider: claude
      model: claude-haiku-4-5

  quality-first:
    description: Highest answer quality profile with Claude Sonnet as the strong model.
    fast:
      provider: openai
      model: gpt-5.4-mini
    strong:
      provider: claude
      model: claude-sonnet-4-6
