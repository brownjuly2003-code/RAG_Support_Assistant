services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rag_restore_test
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag_test
    ports:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d rag_restore_test"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - rag-restore-test

networks:
  rag-restore-test:
