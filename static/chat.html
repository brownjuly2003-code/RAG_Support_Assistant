<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Support Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background: #2563eb;
            color: white;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        header h1 { font-size: 18px; font-weight: 600; }
        .status {
            margin-left: auto;
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 12px;
            background: rgba(255,255,255,0.2);
        }
        .status.ok { background: #22c55e; }
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .msg {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            font-size: 14px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .msg.user {
            align-self: flex-end;
            background: #2563eb;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .msg.bot {
            align-self: flex-start;
            background: white;
            color: #1f2937;
            border: 1px solid #e5e7eb;
            border-bottom-left-radius: 4px;
        }
        .msg .meta {
            margin-top: 8px;
            font-size: 11px;
            opacity: 0.7;
            display: flex;
            gap: 12px;
        }
        .msg .sources {
            margin-top: 8px;
            font-size: 12px;
            color: #6b7280;
        }
        .msg .sources span {
            display: inline-block;
            background: #f3f4f6;
            padding: 2px 8px;
            border-radius: 4px;
            margin: 2px 4px 2px 0;
        }
        .typing {
            align-self: flex-start;
            color: #9ca3af;
            font-size: 14px;
            display: none;
        }
        .typing.active { display: block; }
        .input-area {
            padding: 16px 24px;
            background: white;
            border-top: 1px solid #e5e7eb;
            display: flex;
            gap: 12px;
        }
        .input-area input {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }
        .input-area input:focus { border-color: #2563eb; }
        .input-area button {
            padding: 10px 24px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
        }
        .input-area button:hover { background: #1d4ed8; }
        .input-area button:disabled { background: #9ca3af; cursor: not-allowed; }
    </style>
</head>
<body>
    <header>
        <h1>RAG Support Assistant</h1>
        <div class="status" id="status">connecting...</div>
    </header>

    <div class="chat-area" id="chat">
        <div class="msg bot">
            Здравствуйте! Я ассистент службы поддержки. Задайте мне вопрос, и я постараюсь ответить на основе базы знаний.
        </div>
    </div>

    <div class="typing" id="typing">Ассистент печатает...</div>

    <div class="input-area">
        <input type="text" id="input" placeholder="Введите вопрос..." autocomplete="off" />
        <button id="send" onclick="sendMessage()">Отправить</button>
    </div>

    <script>
        const chatEl = document.getElementById('chat');
        const inputEl = document.getElementById('input');
        const sendBtn = document.getElementById('send');
        const typingEl = document.getElementById('typing');
        const statusEl = document.getElementById('status');

        let sessionId = null;

        inputEl.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        async function checkHealth() {
            try {
                const r = await fetch('/api/health');
                const d = await r.json();
                statusEl.textContent = d.vector_store_loaded ? 'online' : 'no index';
                statusEl.className = 'status' + (d.vector_store_loaded ? ' ok' : '');
            } catch {
                statusEl.textContent = 'offline';
                statusEl.className = 'status';
            }
        }

        function addMessage(text, role, extra) {
            const div = document.createElement('div');
            div.className = 'msg ' + role;
            div.textContent = text;

            if (extra && role === 'bot') {
                const meta = document.createElement('div');
                meta.className = 'meta';
                if (extra.quality_score != null) {
                    meta.innerHTML += '<span>Quality: ' + extra.quality_score + '/100</span>';
                }
                if (extra.route) {
                    meta.innerHTML += '<span>Route: ' + extra.route + '</span>';
                }
                div.appendChild(meta);

                if (extra.sources && extra.sources.length > 0) {
                    const src = document.createElement('div');
                    src.className = 'sources';
                    src.innerHTML = 'Sources: ' + extra.sources
                        .filter(s => s.source)
                        .map(s => '<span>' + s.source + '</span>')
                        .join('');
                    div.appendChild(src);
                }
            }

            chatEl.appendChild(div);
            chatEl.scrollTop = chatEl.scrollHeight;
        }

        async function sendMessage() {
            const q = inputEl.value.trim();
            if (!q) return;

            inputEl.value = '';
            sendBtn.disabled = true;
            addMessage(q, 'user');
            typingEl.classList.add('active');

            try {
                const body = { question: q };
                if (sessionId) body.session_id = sessionId;

                const r = await fetch('/api/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });
                const d = await r.json();

                if (!sessionId && d.session_id) sessionId = d.session_id;

                addMessage(d.answer || '[no answer]', 'bot', {
                    quality_score: d.quality_score,
                    route: d.route,
                    sources: d.sources || [],
                });
            } catch (err) {
                addMessage('Error: ' + err.message, 'bot');
            } finally {
                typingEl.classList.remove('active');
                sendBtn.disabled = false;
                inputEl.focus();
            }
        }

        checkHealth();
        setInterval(checkHealth, 30000);
    </script>
</body>
</html>
