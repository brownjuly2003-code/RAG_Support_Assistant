<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Analytics Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js" integrity="sha384-jb8JQMbMoBUzgWatfe6COACi2ljcDdZQ2OxczGA3bGNeWe+6DChMTBJemed7ZnvJ" crossorigin="anonymous"></script>
<style>
  body {
    font-family: Georgia, "Times New Roman", serif;
    margin: 0;
    background: #f6f1e8;
    color: #1f2328;
  }
  header, main {
    padding: 24px 32px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
  }
  .card {
    background: #ffffff;
    border: 1px solid rgba(31, 35, 40, 0.12);
    border-radius: 18px;
    padding: 18px;
    box-shadow: 0 12px 30px rgba(31, 35, 40, 0.08);
  }
  #cost-label {
    color: #2f4f3f;
    font-weight: 600;
  }
  canvas {
    width: 100% !important;
    height: 240px !important;
  }
</style>
</head>
<body>
<header>
  <h1>Analytics Dashboard</h1>
  <p>Product analytics from live traces: top topics, resolution, cost, and trends.</p>
</header>
<main>
  <div class="grid">
    <section class="card">
      <h2>Top Topics</h2>
      <canvas id="topics-chart"></canvas>
    </section>
    <section class="card">
      <h2>Resolution Rate</h2>
      <canvas id="resolution-chart"></canvas>
    </section>
    <section class="card">
      <h2>Cost Summary</h2>
      <canvas id="cost-chart"></canvas>
      <p id="cost-label"></p>
      <p id="cost-breakdown"></p>
    </section>
    <section class="card">
      <h2>Quality Trend</h2>
      <canvas id="trend-chart"></canvas>
    </section>
  </div>
</main>
<script src="/static/analytics.inline.js"></script>
</body>
</html>
